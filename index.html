<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANWSTORE</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .logo-img { width: 130px; height: 130px; border-radius: 30px; border: 3px solid #facc15; box-shadow: 0 0 20px rgba(250, 204, 21, 0.5); }
        .brand-name { font-size: 32px; font-weight: bold; color: #facc15; margin: 10px 0; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 20px; border-radius: 20px; max-width: 400px; margin: 20px auto; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/130'">
    <div class="brand-name">ANWSTORE</div>

    <!-- BORANG LOGIN -->
    <div class="card">
        <h3 style="text-align: center; color: #facc15;">LOGIN</h3>
        <div class="input-group"><input type="text" placeholder="Username"></div>
        <div class="input-group"><input type="password" placeholder="Password"></div>
        <button class="btn" style="background: #8b5cf6;">MASUK</button>
    </div>

    <!-- BORANG DAFTAR (Diletakkan terus di bawah tanpa sembunyi) -->
    <div class="card" style="border-color: #4ade80;">
        <h3 style="text-align: center; color: #4ade80;">DAFTAR AKAUN BARU</h3>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="reg-name">
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="reg-email">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="reg-pass">
        </div>
        <button type="button" id="btn-submit" class="btn" style="background: #22c55e;" onclick="hantarPendaftaran()">HANTAR PENDAFTARAN</button>
    </div>

    <script>
        function hantarPendaftaran() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const btn = document.getElementById('btn-submit');

            if(!name  !email  !pass) {
                alert("Sila isi semua ruangan!");
                return;
            }

            btn.innerHTML = "SEDANG PROSES...";
            btn.disabled = true;

            const scriptURL = "https://script.google.com/macros/s/AKfycbyJRCKV94HP8PhqVUy_NGeg07l8wOginzmYqbpVk6o73boKtmcKtdJRdQoVfyJkMdF3/exec";
            
            fetch(scriptURL + "?nama=" + encodeURIComponent(name) + "&email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(pass))
            .then(() => {
                alert("Berjaya! Data telah masuk ke Google Sheets.");
                location.reload(); // Refresh skrin selepas berjaya
            })
            .catch(() => {
                alert("Ralat sambungan! Pastikan Apps Script anda 'Anyone' access.");
                btn.disabled = false;
                btn.innerHTML = "HANTAR PENDAFTARAN";
            });
        }
    </script>
</body>
</html>
