<!-- Salin semua kod ini dan gantikan dalam index.html anda -->
<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANWSTORE</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .logo-container { margin-bottom: 20px; }
        .logo-img { width: 130px; height: 130px; border-radius: 30px; border: 3px solid #facc15; box-shadow: 0 0 20px rgba(250, 204, 21, 0.5); }
        .brand-name { font-size: 32px; font-weight: bold; color: #facc15; }
        .login-card { background: rgba(30, 41, 59, 0.7); padding: 25px; border-radius: 25px; max-width: 400px; margin: 20px auto; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 10px; color: white; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 15px; background: #8b5cf6; color: white; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-outline { width: 100%; padding: 12px; background: transparent; color: white; border: 1px solid white; border-radius: 12px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/130'">
    </div>
    <div class="brand-name">ANWSTORE</div>

    <!-- LOGIN -->
    <div id="login-section" class="login-card">
        <h3 style="text-align: center;">LOGIN MANUAL</h3>
        <div class="input-group"><input type="text" placeholder="Username"></div>
        <div class="input-group"><input type="password" placeholder="Password"></div>
        <button class="btn-primary">MASUK SEKARANG</button>
        <!-- Pastikan onclick="tukarKeDaftar()" ada di sini -->
        <button type="button" class="btn-outline" onclick="tukarKeDaftar()">DAFTAR AKAUN BARU</button>
    </div>

    <!-- REGISTER -->
    <div id="register-section" class="login-card" style="display: none;">
        <h3 style="text-align: center; color: #4ade80;">DAFTAR AKUN</h3>
        <div class="input-group"><input type="text" id="reg-name" placeholder="Username"></div>
        <div class="input-group"><input type="email" id="reg-email" placeholder="Email"></div>
        <div class="input-group"><input type="password" id="reg-pass" placeholder="Password"></div>
        <button type="button" id="btn-submit" class="btn-primary" style="background: #22c55e;" onclick="hantarPendaftaran()">HANTAR</button>
        <button type="button" class="btn-outline" onclick="tukarKeLogin()">BATAL</button>
    </div>

    <script>
        function tukarKeDaftar() {
            console.log("Butang Daftar ditekan");
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'block';
        }

        function tukarKeLogin() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('register-section').style.display = 'none';
        }

        function hantarPendaftaran() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const btn = document.getElementById('btn-submit');

            if(!name  !email  !pass) {
                alert("Sila isi semua ruangan!");
                return;
            }

            btn.innerHTML = "PROSES...";
            btn.disabled = true;

const url = "https://script.google.com/macros/s/AKfycbyJRCKV94HP8PhqVUy_NGeg07l8wOginzmYqbpVk6o73boKtmcKtdJRdQoVfyJkMdF3/exec";
            
            fetch(url + "?nama=" + encodeURIComponent(name) + "&email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(pass))
            .then(() => {
                alert("Berjaya! Sila semak Google Sheets.");
                tukarKeLogin();
            })
            .catch(() => alert("Ralat! Sila pastikan Apps Script anda sudah di-Deploy sebagai 'Anyone'."))
            .finally(() => {
                btn.innerHTML = "HANTAR";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
