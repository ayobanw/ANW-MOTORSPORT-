<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANWSTORE - CPM1 TOOL</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .logo-container { margin-top: 20px; }
        video { width: 130px; height: 130px; border-radius: 30px; border: 3px solid #facc15; box-shadow: 0 0 20px rgba(250, 204, 21, 0.5); object-fit: cover; }
        .brand-name { font-size: 32px; font-weight: bold; background: linear-gradient(to right, #facc15, #4ade80, #38bdf8, #facc15); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        .login-card { background: rgba(30, 41, 59, 0.7); padding: 25px; border-radius: 25px; max-width: 400px; margin: 20px auto; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left; backdrop-filter: blur(10px); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 15px; background: linear-gradient(90deg, #8b5cf6, #a855f7); color: white; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; }
        .btn-outline { width: 100%; padding: 12px; background: transparent; color: white; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="logo-container">
        <video autoplay loop muted playsinline><source src="video.mp4" type="video/mp4"></video>
    </div>
    <div class="brand-name">ANWSTORE</div>
    <p style="color: #94a3b8;">CPM1 TOOL ● Online 24 Jam</p>

    <div id="login-section" class="login-card">
        <h3 style="text-align: center; color: #facc15;">LOGIN MANUAL</h3>
        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Password">
        </div>
        <button class="btn-primary">MASUK SEKARANG</button>
        <button type="button" class="btn-outline" onclick="tukarKeDaftar()">DAFTAR AKAUN BARU</button>
    </div>

    <div id="register-section" class="login-card" style="display: none; border-color: #4ade80;">
        <h3 style="text-align: center; color: #4ade80;">DAFTAR AKAUN</h3>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="reg-name">
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="reg-email">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="reg-pass">
        </div>
        <button type="button" id="btn-submit" class="btn-primary" style="background: #22c55e;" onclick="hantarPendaftaran()">HANTAR</button>
        <button type="button" class="btn-outline" onclick="tukarKeLogin()">BATAL</button>
    </div>

    <script>
        function tukarKeDaftar() {
            console.log("Membuka kotak daftar...");
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'block';
        }

        function tukarKeLogin() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('register-section').style.display = 'none';
        }

function hantarPendaftaran() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const btn = document.getElementById('btn-submit');

            if(!name  !email  !pass) {
                alert("Sila isi semua ruangan!");
                return;
            }

            btn.innerHTML = "PROSES...";
            btn.disabled = true;

            const url = "https://script.google.com/macros/s/AKfycbyJRCKV94HP8PhqVUy_NGeg07l8wOginzmYqbpVk6o73boKtmcKtdJRdQoVfyJkMdF3/exec";
            
            fetch(url + "?nama=" + encodeURIComponent(name) + "&email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(pass))
            .then(() => {
                alert("Berjaya mendaftar!");
                tukarKeLogin();
            })
            .catch(() => alert("Ralat sambungan!"))
            .finally(() => {
                btn.innerHTML = "HANTAR";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
