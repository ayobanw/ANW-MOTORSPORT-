<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANWSTORE</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .login-card { background: rgba(30, 41, 59, 0.6); padding: 25px; border-radius: 25px; max-width: 400px; margin: 0 auto; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: #8b5cf6; color: white; }
        .btn-outline { background: transparent; border: 1px solid white; color: white; }
    </style>
</head>
<body>

    <h2 style="color: #facc15;">ANWSTORE</h2>

    <div id="login-section" class="login-card">
        <h3 style="text-align: center;">LOGIN</h3>
        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Password">
        </div>
        <button class="btn btn-primary">MASUK</button>
        <button type="button" class="btn btn-outline" onclick="tukarKeDaftar()">DAFTAR AKAUN BARU</button>
    </div>

    <div id="register-section" class="login-card" style="display: none;">
        <h3 style="text-align: center; color: #4ade80;">DAFTAR AKAUN</h3>
        <div class="input-group">
            <label>Username Baru</label>
            <input type="text" id="reg-name" placeholder="Contoh: ayobanw">
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="email@contoh.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="reg-pass" placeholder="Min 6 karakter">
        </div>
        <button type="button" id="btn-submit" class="btn btn-primary" style="background: #22c55e;" onclick="hantarPendaftaran()">HANTAR PENDAFTARAN</button>
        <button type="button" class="btn btn-outline" onclick="tukarKeLogin()">BATAL</button>
    </div>

    <script>
        function tukarKeDaftar() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'block';
        }

        function tukarKeLogin() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('register-section').style.display = 'none';
        }

        function hantarPendaftaran() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const btn = document.getElementById('btn-submit');

            if(!name  !email  !pass) {
                alert("Sila isi semua ruangan!");
                return;
            }

            btn.innerHTML = "SEDANG DIHANTAR...";
            btn.disabled = true;

            const scriptURL = "https://script.google.com/macros/s/AKfycbyJRCKV94HP8PhqVUy_NGeg07l8wOginzmYqbpVk6o73boKtmcKtdJRdQoVfyJkMdF3/exec";
            
            fetch(scriptURL + "?nama=" + encodeURIComponent(name) + "&email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(pass))

.then(response => {
                    alert("Pendaftaran Berjaya! Data anda telah masuk ke Admin Panel.");
                    tukarKeLogin();
                })
                .catch(error => {
                    alert("Ralat sambungan! Sila cuba lagi.");
                })
                .finally(() => {
                    btn.innerHTML = "HANTAR PENDAFTARAN";
                    btn.disabled = false;
                });
        }
    </script>
</body>
</html>
