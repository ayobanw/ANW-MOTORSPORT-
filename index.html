<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANWSTORE</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .logo-img { width: 120px; height: 120px; border-radius: 25px; border: 3px solid #facc15; margin-top: 20px; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4); }
        .brand-name { font-size: 28px; font-weight: bold; color: #facc15; margin: 10px 0; }
        
        /* KOTAK LOGIN */
        .card { background: rgba(30, 41, 59, 0.7); padding: 25px; border-radius: 25px; max-width: 380px; margin: 20px auto; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; box-sizing: border-box; outline: none; }
        
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.3s; }
        .btn-purple { background: #8b5cf6; color: white; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #334155; margin-top: 15px; }

        /* MODAL (BORANG DAFTAR) */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: #1e293b; margin: 15% auto; padding: 25px; border-radius: 25px; width: 85%; max-width: 380px; border: 1px solid #4ade80; text-align: left; }
    </style>
</head>
<body>

    <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/120'">
    <div class="brand-name">ANWSTORE</div>

    <!-- KOTAK LOGIN ASAL -->
    <div class="card">
        <h3 style="text-align: center; color: #facc15; margin-top: 0;">LOGIN</h3>
        <div class="input-group">
            <input type="text" placeholder="Username">
        </div>
        <div class="input-group">
            <input type="password" placeholder="Password">
        </div>
        <button class="btn btn-purple">MASUK SEKARANG</button>
        <button type="button" class="btn btn-outline" onclick="bukaModal()">DAFTAR AKAUN BARU</button>
    </div>

    <!-- POP-UP DAFTAR -->
    <div id="modalDaftar" class="modal">
        <div class="modal-content">
            <h3 style="text-align: center; color: #4ade80; margin-top: 0;">PENDAFTARAN BARU</h3>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="reg-name">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="reg-email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="reg-pass">
            </div>
            <button type="button" id="btn-submit" class="btn" style="background: #22c55e; color: white;" onclick="hantarData()">HANTAR SEKARANG</button>
            <button type="button" class="btn btn-outline" onclick="tutupModal()">BATAL</button>
        </div>
    </div>

    <script>
        function bukaModal() {
            document.getElementById('modalDaftar').style.display = "block";
        }

        function tutupModal() {
            document.getElementById('modalDaftar').style.display = "none";
        }

        function hantarData() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const btn = document.getElementById('btn-submit');

if(!name  !email  !pass) {
                alert("Sila isi semua ruangan!");
                return;
            }

            btn.innerHTML = "SEDANG DIHANTAR...";
            btn.disabled = true;

            const scriptURL = "https://script.google.com/macros/s/AKfycbyJRCKV94HP8PhqVUy_NGeg07l8wOginzmYqbpVk6o73boKtmcKtdJRdQoVfyJkMdF3/exec";
            const finalURL = scriptURL + "?nama=" + encodeURIComponent(name) + "&email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(pass);

            fetch(finalURL)
            .then(() => {
                alert("Berjaya! Sila semak Admin Panel.");
                tutupModal();
                location.reload();
            })
            .catch(() => {
                alert("Ralat! Pastikan Apps Script 'Anyone' access.");
                btn.disabled = false;
                btn.innerHTML = "HANTAR SEKARANG";
            });
        }
    </script>
</body>
</html>
