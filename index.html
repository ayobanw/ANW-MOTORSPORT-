<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANWSTORE - PENDAFTARAN</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; border: 1.5px solid #4ade80; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: #facc15; margin-bottom: 20px; letter-spacing: 1px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #facc15; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>ANWSTORE</h2>
    <form id="regForm">
        <div class="input-group">
            <label>NAMA PENGGUNA</label>
            <input type="text" name="nama" placeholder="Masukkan nama" required>
        </div>
        <div class="input-group">
            <label>EMAIL</label>
            <input type="email" name="email" placeholder="Masukkan email" required>
        </div>
        <div class="input-group">
            <label>KATA LALUAN</label>
            <input type="password" name="password" placeholder="Masukkan password" required>
        </div>
        <button type="submit" id="btn-submit">HANTAR SEKARANG</button>
    </form>
</div>

<script>
    // 1. TAMPAL LINK /exec YANG BARU ANDA SALIN TADI DI SINI
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyRb4QA0bIb5-SWCKo6_fq8_xWk7bTMxLCu-a9IeIr5HHdPEeEDej3aaMNKwlF4irA/exec';
    
    const form = document.getElementById('regForm');
    const btn = document.getElementById('btn-submit');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "SEDANG DIHANTAR...";

        // Menghantar data menggunakan kaedah POST
        fetch(scriptURL, { 
            method: 'POST', 
            body: new FormData(form),
            mode: 'no-cors' 
        })
        .then(() => {
            alert("✅ BERJAYA! daftar user.");
            form.reset();
            btn.disabled = false;
            btn.innerHTML = "HANTAR SEKARANG";
        })
        .catch(error => {
            alert("❌ RALAT! Cuba lagi.");
            btn.disabled = false;
            btn.innerHTML = "HANTAR SEKARANG";
        });
    });
</script>

</body>
</html>
